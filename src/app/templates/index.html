<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>App de prédiction immobilière - Prototype</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
      /* Styles du widget de chat Gradio */
      .chat-widget {
          position: fixed;
          bottom: 20px;
          right: 20px;
          z-index: 1000;
      }
      .chat-toggle {
          width: 50px;
          height: 50px;
          border-radius: 50%;
          background: #0d6efd; 
          border: none;
          color: white;
          font-size: 24px;
          cursor: pointer;
          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      .chat-container {
          position: fixed;
          bottom: 80px;
          right: 20px;
          width: 1000px;
          height: 700px;
          background: white;
          border-radius: 10px;
          box-shadow: 0 5px 15px rgba(0,0,0,0.2);
          display: flex;
          flex-direction: column;
      }
      .chat-container.hidden {
          display: none;
      }
      #chat-header {
          padding: 15px;
          background: #0d6efd;
          color: white;
          border-radius: 10px 10px 0 0;
          display: flex;
          justify-content: space-between;
          align-items: center;
      }
      #chat-header h3 {
          margin: 0;
          font-size: 1.1rem;
      }
      #chat-messages {
          flex-grow: 1;
          overflow-y: auto;
          padding: 15px;
          font-size: 0.9rem;
      }
      #chat-input-area {
          padding: 10px;
          border-top: 1px solid #eee;
          display: flex;
          gap: 8px;
      }
      #chat-input {
          flex-grow: 1;
          padding: 8px 12px;
          border: 1px solid #ddd;
          border-radius: 20px;
          outline: none;
      }
      #chat-input:focus {
          border-color: #0d6efd;
      }
      #send-message {
          background: #0d6efd;
          color: white;
          border: none;
          padding: 0 15px;
          border-radius: 20px;
          cursor: pointer;
      }
      
      /* Style des bulles de messages */
      .message {
          margin: 8px 0;
          padding: 10px 14px;
          border-radius: 15px;
          width: fit-content;
          max-width: 90%;
          word-wrap: break-word;
      }
      .user-message {
          background: #e9ecef;
          margin-left: auto;
          border-bottom-right-radius: 2px;
      }
      .bot-message {
          background: #f8f9fa;
          margin-right: auto;
          border-bottom-left-radius: 2px;
          border: 1px solid #eee;
      }
      .bot-message p:last-child {
          margin-bottom: 0;
      }

      /* Mise en forme du Markdown dans les bulles du bot */
      .bot-message pre {
          background: #2d2d2d;
          color: #f8f8f2;
          padding: 8px;
          border-radius: 5px;
          overflow-x: auto;
          font-family: monospace;
          font-size: 0.8rem;
          margin-top: 8px;
      }
      .bot-message code {
          background: #e9ecef;
          padding: 2px 4px;
          border-radius: 4px;
          font-family: monospace;
          font-size: 0.85rem;
          color: #d63384;
      }
      .bot-message pre code {
          background: transparent;
          color: inherit;
          padding: 0;
      }
      .bot-message ul, .bot-message ol {
          padding-left: 20px;
          margin-bottom: 8px;
      }
      .bot-message blockquote {
          border-left: 3px solid #0d6efd;
          padding-left: 10px;
          color: #6c757d;
          margin-left: 0;
      }

      /* Animation de chargement */
      .typing-indicator {
          display: flex;
          gap: 4px;
          padding: 4px 8px;
          align-items: center;
          height: 24px;
      }
      .typing-indicator span {
          width: 6px;
          height: 6px;
          background-color: #888;
          border-radius: 50%;
          animation: bounce 1.4s infinite ease-in-out both;
      }
      .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
      .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
      @keyframes bounce {
          0%, 80%, 100% { transform: scale(0); }
          40% { transform: scale(1); }
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Estimation DVF</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link active" href="/">Prédiction</a></li>
            <li class="nav-item"><a class="nav-link" href="/shap">SHAP</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="row">
        <div class="col-md-7">
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">Formulaire d'estimation</h5>
              <p class="text-muted">Remplissez quelques informations pour obtenir une estimation rapide.</p>

              <form id="form" onsubmit="return false;">
                <div class="mb-3">
                  <label for="commune" class="form-label">Commune (nom) ou code INSEE</label>
                  <input id="commune" class="form-control" placeholder="Ex: Paris ou 75056" />
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="type_voie" class="form-label">Type de voie</label>
                    <select id="type_voie" class="form-select">
                      <option value="">(Chargement...)</option>
                    </select>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="type_local" class="form-label">Type local</label>
                    <select id="type_local" class="form-select">
                      <option value="">(Chargement...)</option>
                    </select>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="surface_terrain" class="form-label">Surface terrain (m²)</label>
                      <input id="surface_terrain" class="form-control" placeholder="Ex: 0" type="number" min="0" step="any" />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="surface_reelle_bati" class="form-label">Surface reelle bati (m²)</label>
                    <input id="surface_reelle_bati" class="form-control" placeholder="Ex: 45" type="number" min="0" step="any" />
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="nombre_pieces_principales" class="form-label">Nombre pieces principales</label>
                    <input id="nombre_pieces_principales" class="form-control" placeholder="Ex: 2" type="number" min="0" />
                  </div>
                </div>

                <button id="predict" class="btn btn-primary">Obtenir une estimation</button>
              </form>
              <hr />
              <div>
                <label for="tokenInput" class="form-label">Jeton API (à demander)</label>
                <div class="input-group mb-3">
                  <input id="tokenInput" class="form-control" placeholder="Collez votre token ici" />
                  <button id="saveToken" class="btn btn-outline-secondary" type="button">Enregistrer</button>
                  <button id="clearToken" class="btn btn-outline-secondary" type="button">Effacer</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-5">
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">Résultat</h5>
              <div id="result">Aucun résultat pour l'instant.</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="chat-widget" class="chat-widget">
        <button id="chat-toggle" class="chat-toggle">💬</button>
        <div id="chat-container" class="chat-container hidden">
            <div id="chat-header">
                <h3>Assistant DVF</h3>
                <button id="close-chat" class="btn-close btn-close-white" aria-label="Close"></button>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Posez votre question...">
                <button id="send-message">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
      async function callPredictPublic(payload){
        const res = await fetch('/predict-public', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if(!res.ok) throw new Error('Erreur réseau: ' + res.status);
        return res.json();
      }

      const tokenInput = document.getElementById('tokenInput');
      const saveTokenBtn = document.getElementById('saveToken');
      const clearTokenBtn = document.getElementById('clearToken');

      async function populateSelects(){
        try{
          const res = await fetch('/meta/options');
          if(!res.ok) return;
          const data = await res.json();
          const tv = document.getElementById('type_voie');
          const tl = document.getElementById('type_local');
          tv.innerHTML = '';
          tl.innerHTML = '';
          const addOpt = (el, v) => { const o = document.createElement('option'); o.value = v; o.text = v; el.appendChild(o); };
          addOpt(tv, '');
          addOpt(tl, '');
          (data.type_voie || []).forEach(v => addOpt(tv, v));
          (data.type_local || []).forEach(v => addOpt(tl, v));
        }catch(e){
        }
      }
      populateSelects();

      function getSavedToken(){ return localStorage.getItem('api_token') || ''; }
      function setSavedToken(t){ localStorage.setItem('api_token', t); }
      function clearSavedToken(){ localStorage.removeItem('api_token'); }

      tokenInput.value = getSavedToken();

      saveTokenBtn.addEventListener('click', ()=>{ setSavedToken(tokenInput.value.trim()); alert('Token enregistré dans le navigateur'); });
      clearTokenBtn.addEventListener('click', ()=>{ clearSavedToken(); tokenInput.value=''; alert('Token effacé'); });

      document.getElementById('predict').addEventListener('click', async (e)=>{
        e.preventDefault();
        const out = document.getElementById('result');
        out.textContent = 'Calcul en cours...';
        try{
          function readNumber(id){
            const el = document.getElementById(id);
            if(!el) return null;
            const v = el.value;
            if(v === null || v === undefined || v === "") return null;
            const n = Number(v);
            return Number.isFinite(n) ? n : null;
          }

          const payload = {};
          const communeVal = document.getElementById('commune').value;
          const possibleCode = communeVal ? communeVal.trim() : '';
          if(possibleCode && /^\d{5}$/.test(possibleCode)){
            payload['code_insee'] = possibleCode;
          } else {
            payload['commune'] = possibleCode;
          }
          payload['type_voie'] = (document.getElementById('type_voie').value || '').trim();
          payload['type_local'] = (document.getElementById('type_local').value || '').trim();
          payload['surface_terrain'] = readNumber('surface_terrain');
          payload['surface_reelle_bati'] = readNumber('surface_reelle_bati');
          payload['nombre_pieces_principales'] = readNumber('nombre_pieces_principales');

          const token = getSavedToken();
          const headers = { 'Content-Type': 'application/json' };
          if(token) headers['Authorization'] = 'Bearer ' + token;

          const res = await fetch('/predict', { method: 'POST', headers, body: JSON.stringify(payload) });
          if(!res.ok){
            const txt = await res.text();
            throw new Error('API error ' + res.status + ': ' + txt);
          }
          const data = await res.json();
          if(data && (data.estimated_price || (data.result && data.result.estimated_price))){
            const price = data.estimated_price ?? (data.result && data.result.estimated_price);
            out.innerHTML = `<div class="text-center"><h2 style="font-size:2.2rem; font-weight:700;">${Number(price).toLocaleString('fr-FR')} €</h2><div class="text-muted small mt-2">Estimation</div></div>`;
          } else if(data && data.result && data.result.estimated_price){
            const price = data.result.estimated_price;
            out.innerHTML = `<div class="text-center"><h2 style="font-size:2.2rem; font-weight:700;">${Number(price).toLocaleString('fr-FR')} €</h2><div class="text-muted small mt-2">Estimation (fallback)</div></div>`;
          } else {
            out.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
          }
        }catch(err){
          out.textContent = 'Erreur: ' + err.message;
        }
      });
    </script>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        
        async function initChatWidget() {
            const gradioAppUrl = "http://127.0.0.1:7860/"; 
            
            let client;
            try {
                client = await Client.connect(gradioAppUrl);
            } catch (err) {
                console.warn("L'application Gradio locale n'est pas accessible.");
            }
            
            const chatToggle = document.getElementById('chat-toggle');
            const chatContainer = document.getElementById('chat-container');
            const closeChat = document.getElementById('close-chat');
            const chatInput = document.getElementById('chat-input');
            const sendButton = document.getElementById('send-message');
            const messagesContainer = document.getElementById('chat-messages');
        
            chatToggle.addEventListener('click', () => {
                chatContainer.classList.remove('hidden');
            });
        
            closeChat.addEventListener('click', () => {
                chatContainer.classList.add('hidden');
            });

            let chatHistory = [];
            let isBusy = false;
            const typingHtml = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            // Extracteur de texte récursif ultra-robuste
            function extractText(val) {
                if (val === null || val === undefined) return "";
                if (typeof val === 'string') return val;
                
                // Si c'est un tableau de composants (fréquent avec les nouvelles APIs Gradio/LangChain)
                if (Array.isArray(val)) {
                    return val.map(v => extractText(v)).join("\n");
                }
                
                // Si c'est un objet (dictionnaire)
                if (typeof val === 'object') {
                    if (val.text !== undefined) return extractText(val.text);
                    if (val.value !== undefined) return extractText(val.value);
                    if (val.content !== undefined) return extractText(val.content);
                    if (val.name !== undefined) return extractText(val.name);
                    
                    // Si on ne trouve pas de clés connues, on stringify proprement pour débugger au lieu de [object Object]
                    try {
                        return "```json\n" + JSON.stringify(val, null, 2) + "\n```";
                    } catch(e) {
                        return "Structure complexe non lisible";
                    }
                }
                
                return String(val);
            }

            function appendBubble(contentStr, sender, isRawHtml = false, id = null) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                if (id) messageDiv.id = id;
                
                if (isRawHtml) {
                    messageDiv.innerHTML = contentStr;
                } else if (sender === 'bot') {
                    // On parse le markdown pour le bot
                    messageDiv.innerHTML = marked.parse(contentStr);
                } else {
                    messageDiv.textContent = contentStr;
                }
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        
            async function sendMessage() {
                const userMessage = chatInput.value.trim();
                if (!userMessage || isBusy) return;

                appendBubble(userMessage, 'user');
                chatInput.value = '';

                if (!client) {
                    return;
                }

                isBusy = true;
                const loadingId = "loading-" + Date.now();
                appendBubble(typingHtml, 'bot', true, loadingId);

                try {
                    const stream = client.submit("/chat", [userMessage, chatHistory]);

                    for await (const event of stream) {
                        if (event.type === "data" || event.type === "update") {
                            const updatedHistory = event.data[0];
                            if (updatedHistory && Array.isArray(updatedHistory)) {
                                chatHistory = updatedHistory;
                                messagesContainer.innerHTML = '';
                                
                                chatHistory.forEach((msg) => {
                                    // Cas 1 : Gradio nous renvoie le format tuples [[user_msg, bot_msg]]
                                    if (Array.isArray(msg)) {
                                        if (msg[0] !== null && msg[0] !== undefined) {
                                            appendBubble(extractText(msg[0]), 'user');
                                        }
                                        if (msg[1] !== null && msg[1] !== undefined) {
                                            const bTxt = extractText(msg[1]);
                                            if (bTxt.trim() === "") appendBubble(typingHtml, 'bot', true);
                                            else appendBubble(bTxt, 'bot');
                                        } else {
                                            appendBubble(typingHtml, 'bot', true);
                                        }
                                    } 
                                    // Cas 2 : Gradio nous renvoie le format messages [{role: "user", content: "..."}]
                                    else if (msg && typeof msg === 'object') {
                                        const sender = msg.role === 'user' ? 'user' : 'bot';
                                        
                                        // On passe tout l'objet msg à l'extracteur qui trouvera la clé 'content'
                                        let text = extractText(msg.content || msg.text || msg);
                                        
                                        if (sender === 'bot' && text.trim() === "") {
                                            appendBubble(typingHtml, 'bot', true);
                                        } else {
                                            appendBubble(text, sender);
                                        }
                                    }
                                });
                            }
                        }
                    }
                } catch (error) {
                    const errorEl = document.getElementById(loadingId);
                    if(errorEl) errorEl.innerHTML = "❌ Une erreur s'est produite lors de la génération.";
                }
                isBusy = false;
            }
        
            sendButton.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }
        
        initChatWidget();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
