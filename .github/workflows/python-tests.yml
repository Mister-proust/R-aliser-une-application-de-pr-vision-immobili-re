name: Python CI/CD - Tests (uv)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run tests with pytest
      run: uv run pytest
