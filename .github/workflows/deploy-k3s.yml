name: Build & Deploy to K3S + GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  NAMESPACE: expert-immo
  IMAGE_NAME: mister-proust/r-aliser-une-application-de-pr-vision-immobili-re

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Pour les infos Git complètes
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix={{branch}}-,suffix=-${{ github.sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Echo image tag
        run: |
          echo "✅ Image built and pushed to GHCR"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  deploy-to-k3s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'  # Deploy only on push, not on tag creation
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup kubeconfig
        env:
          K3S_KUBECONFIG: ${{ secrets.K3S_KUBECONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$K3S_KUBECONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          echo "✅ Kubeconfig configured"
      
      - name: Verify kubectl connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes
      
      - name: Extract image tag (main branch)
        id: image-tag
        run: |
          # Pour main branch: main-<COMMIT_SHA>
          IMAGE_TAG="main-${GITHUB_SHA::7}"
          echo "FULL_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      
      - name: Ensure namespace exists
        run: |
          kubectl get namespace $NAMESPACE || \
          kubectl create namespace $NAMESPACE
          echo "✅ Namespace $NAMESPACE ready"
      
      - name: Create/Update GHCR registry secret
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_USER: ${{ github.actor }}
        run: |
          kubectl delete secret ghcr-secret \
            --namespace=$NAMESPACE \
            --ignore-not-found
          
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=$GITHUB_USER \
            --docker-password=$GHCR_TOKEN \
            --docker-email=$GITHUB_USER@users.noreply.github.com \
            --namespace=$NAMESPACE
          
          echo "✅ GHCR secret created/updated"
      
      - name: Create/Update environment secrets
        env:
          ENV_SECRETS: ${{ secrets.ENV_SECRETS }}
        run: |
          # Parse ENV_SECRETS and create kubectl secret
          # Format expected: "KEY1=value1\nKEY2=value2\n..."
          
          kubectl delete secret expert-immo-env \
            --namespace=$NAMESPACE \
            --ignore-not-found
          
          # Convert env vars to kubectl secret literals
          ENV_ARGS=""
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              ENV_ARGS="$ENV_ARGS --from-literal=$key=$value"
            fi
          done <<< "$ENV_SECRETS"
          
          kubectl create secret generic expert-immo-env \
            $ENV_ARGS \
            --namespace=$NAMESPACE
          
          echo "✅ Environment secrets created/updated"
      
      - name: Deploy MCP service
        env:
          IMAGE: ${{ steps.image-tag.outputs.FULL_IMAGE }}
        run: |
          kubectl set image deployment/g3-app \
            g3-app=$IMAGE \
            --namespace=$NAMESPACE \
            || echo "⚠️  Deployment not yet created, will apply manifest"
          
          # Apply deployment file with image substitution
          cat k3s/manifests/deployment-mcp.yaml | \
            sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" | \
            kubectl apply -f - --namespace=$NAMESPACE
          
          echo "✅ MCP deployment applied"
      
      - name: Wait for MCP pod to be ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=g3-app \
            --namespace=$NAMESPACE \
            --timeout=300s
          echo "✅ MCP pod ready"
      
      - name: Deploy FastAPI service
        env:
          IMAGE: ${{ steps.image-tag.outputs.FULL_IMAGE }}
        run: |
          cat k3s/manifests/deployment-fastapi.yaml | \
            sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" | \
            kubectl apply -f - --namespace=$NAMESPACE
          
          echo "✅ FastAPI deployment applied"
      
      - name: Deploy Gradio service
        env:
          IMAGE: ${{ steps.image-tag.outputs.FULL_IMAGE }}
        run: |
          cat k3s/manifests/deployment-gradio.yaml | \
            sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" | \
            kubectl apply -f - --namespace=$NAMESPACE
          
          echo "✅ Gradio deployment applied"
      
      - name: Apply services with sessionAffinity
        run: |
          kubectl apply -f k3s/manifests/services.yaml \
            --namespace=$NAMESPACE
          echo "✅ Services applied (with sessionAffinity for MCP)"
      
      - name: Verify all deployments
        run: |
          echo "Waiting for deployments..."
          kubectl rollout status deployment/g3-app \
            --namespace=$NAMESPACE \
            --timeout=300s
          kubectl rollout status deployment/fastapi-app \
            --namespace=$NAMESPACE \
            --timeout=300s
          kubectl rollout status deployment/gradio-app \
            --namespace=$NAMESPACE \
            --timeout=300s
          
          echo "✅ All deployments ready"
          echo ""
          echo "Deployment Summary:"
          kubectl get pods,svc --namespace=$NAMESPACE
      
      - name: Deployment completed
        run: |
          echo "🎉 Deployment to K3S completed successfully!"
          echo ""
          echo "Access points:"
          echo "  FastAPI: http://datalab.myconnectech.fr:30800"
          echo "  Gradio: http://datalab.myconnectech.fr:30786"
          echo "  MCP (internal): mcp-service.expert-immo.svc.cluster.local:8001"
