apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: expert-immo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      # === Image Pull Secrets for GHCR ===
      imagePullSecrets:
      - name: ghcr-secret
      
      # === Volumes ===
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: expert-immo-pvc
      
      # === Containers ===
      containers:
      - name: mcp-server
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 8001
          name: mcp-port
        
        # === Command Override (MCP Server) ===
        command: ["uv", "run", "python", "src/mcp_server/server.py"]
        
        # === Environment Variables ===
        env:
        - name: MCP_SERVER_PORT
          valueFrom:
            configMapKeyRef:
              name: expert-immo-config
              key: MCP_SERVER_PORT
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        
        # === Volume Mounts ===
        volumeMounts:
        - name: shared-data
          mountPath: /data  # Model storage
        - name: shared-data
          mountPath: /app/agentia/bdd  # Database storage
        
        # === Resource Limits ===
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        # === Liveness/Readiness Probes ===
        livenessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        
        # === Security Context ===
        securityContext:
          runAsNonRoot: false  # MCP may need root for DB access
          allowPrivilegeEscalation: false
