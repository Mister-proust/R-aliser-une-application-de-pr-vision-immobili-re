apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: expert-immo-pvc
  namespace: expert-immo
spec:
  accessModes:
    - ReadWriteOnce  # Only one pod can read-write (local storage K3S)
  storageClassName: local-path  # K3S default storage class
  resources:
    requests:
      storage: 5Gi  # 5GB should be enough for DB + model
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: expert-immo-config
  namespace: expert-immo
data:
  MCP_SERVER_PORT: "8001"
  MCP_SERVER_HOST: "mcp-service"  # Internal K3S DNS name
  FASTAPI_PORT: "8000"
  GRADIO_PORT: "7860"
  MISTRAL_API_KEY: ""  # Fill this with your key or use Secrets
  LANGSMITH_API_KEY: ""  # Optional: for tracing
